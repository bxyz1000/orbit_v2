name: orbit_v2
description: AI-powered personal operating system.
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^3.0.3

  # Navigation
  go_router: ^16.2.1

  # Typography
  google_fonts: ^6.3.2

  # Local Database
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2
  path_provider: ^2.1.5

  # Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.7.2
  freezed: ^3.2.0
  json_serializable: ^6.11.1
  isar_community_generator: ^3.3.2

flutter:
  uses-material-design: true